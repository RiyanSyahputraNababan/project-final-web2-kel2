<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout (~{::body})">

<body>

<div class="max-w-6xl mx-auto">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <h2 class="text-2xl font-extrabold text-gray-800">
            Daftar Produk
        </h2>

        <a th:href="@{/products/new}"
           class="bg-blue-500 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-600 hover:scale-[1.02] transition">
            + Tambah Produk
        </a>
    </div>

    <!-- TOTAL -->
    <p class="mb-4 text-gray-600">
        Total produk:
        <span class="font-bold text-blue-500" th:text="${totalItems}"></span>
    </p>

    <!-- SEARCH -->
    <form method="get" action="/products"
          class="bg-white/80 backdrop-blur-lg p-4 rounded-2xl shadow mb-6 flex flex-wrap gap-3 items-center">

        <input type="text" name="keyword"
               placeholder="Cari produk..."
               th:value="${keyword}"
               class="border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg w-full md:w-1/3" />

        <select name="category"
                class="border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg w-full md:w-1/4">
            <option value="">Semua Category</option>

            <option th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${cat.id == selectedCategory}">
            </option>
        </select>

        <button type="submit"
                class="bg-blue-500 text-white px-4 py-2 rounded-lg shadow hover:bg-blue-600 transition">
            Search
        </button>
    </form>

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(products)}"
         class="bg-white/80 backdrop-blur-lg p-6 rounded-2xl shadow text-center text-gray-500">

        <p class="text-lg mb-2">Belum ada produk</p>

        <a href="/products/new"
           class="text-blue-500 font-semibold hover:underline">
            Tambah sekarang
        </a>

    </div>

    <!-- TABLE -->
    <div th:if="${!#lists.isEmpty(products)}"
         class="bg-white/80 backdrop-blur-lg rounded-2xl shadow overflow-x-auto">

        <table class="min-w-full text-sm">

            <thead class="bg-gray-100 text-gray-600 uppercase text-xs">
            <tr>
                <th class="p-4 text-left">ID</th>
                <th class="p-4 text-left">Nama</th>
                <th class="p-4 text-left">Category</th>
                <th class="p-4 text-left">Harga</th>
                <th class="p-4 text-left">Stock</th>
                <th class="p-4 text-left">Status</th>
                <th class="p-4 text-left">Aksi</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="product : ${products}"
                class="border-t hover:bg-blue-50 transition">

                <td class="p-4 text-gray-500" th:text="${product.id}"></td>

                <td class="p-4 font-semibold text-gray-800"
                    th:text="${product.name}"></td>

                <td class="p-4 text-gray-600"
                    th:text="${product.category != null ? product.category.name : '-'}">
                </td>

                <td class="p-4 text-green-600 font-semibold"
                    th:text="'Rp ' + ${#numbers.formatInteger(product.price, 0, 'POINT')}">
                </td>

                <td class="p-4" th:text="${product.stock}"></td>

                <td class="p-4">
                    <span th:if="${product.active}"
                          class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-semibold">
                        Aktif
                    </span>
                    <span th:unless="${product.active}"
                          class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs font-semibold">
                        Tidak Aktif
                    </span>
                </td>

                <td class="p-4 flex gap-3 text-sm">

                    <a th:href="@{/products/{id}(id=${product.id})}"
                       class="text-blue-500 hover:underline">
                        Detail
                    </a>

                    <a th:href="@{/products/{id}/edit(id=${product.id})}"
                       class="text-yellow-600 hover:underline">
                        Edit
                    </a>

                    <form th:action="@{/products/{id}/delete(id=${product.id})}"
                          method="post">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <button type="submit"
                                class="text-red-500 hover:underline">
                            Delete
                        </button>

                    </form>

                </td>

            </tr>
            </tbody>
        </table>

    </div>

    <!-- PAGINATION -->
    <div th:if="${totalPages > 0}"
         class="mt-6 flex flex-wrap items-center gap-2 justify-center">

        <!-- PREVIOUS -->
        <a th:if="${currentPage > 0}"
           th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, category=${selectedCategory})}"
           class="px-3 py-1 bg-gray-200 rounded-lg hover:bg-gray-300">
            Previous
        </a>

        <!-- NUMBER -->
        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">

        <a th:href="@{/products(page=${i}, keyword=${keyword}, category=${selectedCategory})}"
           th:text="${i + 1}"
           class="px-3 py-1 rounded-lg"
           th:classappend="${i == currentPage} ? 'bg-blue-500 text-white' : 'bg-gray-200 hover:bg-gray-300'">
        </a>

    </span>

        <!-- NEXT -->
        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, category=${selectedCategory})}"
           class="px-3 py-1 bg-gray-200 rounded-lg hover:bg-gray-300">
            Next
        </a>

    </div>

</div>

</body>
</html>
