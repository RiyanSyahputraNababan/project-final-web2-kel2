<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 via-white to-blue-100 min-h-screen flex items-center justify-center p-6">

<div class="max-w-xl w-full bg-white/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl">

    <!-- TITLE -->
    <h2 class="text-2xl font-extrabold mb-6 text-gray-800 text-center"
        th:text="${product.id != null ? 'Edit Produk ✏️' : 'Tambah Produk ➕'}">
    </h2>

    <form th:action="@{/products/save}" method="post" th:object="${product}" class="space-y-5">

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <!-- ID -->
        <input type="hidden" th:field="*{id}" />

        <!-- NAMA -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Nama Produk</label>
            <input th:field="*{name}"
                   placeholder="Masukkan nama produk"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- CATEGORY -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Category</label>
            <select name="categoryId"
                    class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"
                    required>

                <option value="">-- Pilih Category --</option>

                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}">
                </option>

            </select>
        </div>

        <!-- HARGA -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Harga</label>
            <input type="number" th:field="*{price}"
                   placeholder="Masukkan harga"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- STOCK -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Stock</label>
            <input type="number" th:field="*{stock}"
                   placeholder="Masukkan jumlah stok"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- DESKRIPSI -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Deskripsi</label>
            <textarea th:field="*{description}"
                      placeholder="Deskripsi produk"
                      class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"></textarea>
        </div>

        <!-- STATUS -->
        <label class="flex items-center gap-2 text-gray-600">
            <input type="checkbox" th:field="*{active}" />
            Produk Aktif
        </label>

        <!-- BUTTON -->
        <div class="flex justify-between items-center mt-6">

            <a href="/products"
               class="text-gray-600 hover:text-blue-500 transition">
                ← Kembali
            </a>

            <button type="submit"
                    class="bg-blue-500 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-600 hover:scale-[1.02] transition">
                Save
            </button>

        </div>

    </form>

</div>

</body>
</html>
