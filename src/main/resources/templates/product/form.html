<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">

    <h2 class="text-xl font-bold mb-4"
        th:text="${product.id != null ? 'Edit Produk' : 'Tambah Produk'}">
    </h2>

    <form th:action="@{/products/save}" method="post" th:object="${product}" class="space-y-4">

        <!-- CSRF TOKEN -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <!-- ID -->
        <input type="hidden" th:field="*{id}" />

        <!-- NAMA -->
        <div>
            <label class="block font-semibold">Nama Produk</label>
            <input th:field="*{name}"
                   placeholder="Masukkan nama produk"
                   class="w-full border p-2 rounded" required />
        </div>

        <!-- CATEGORY -->
        <div>
            <label class="block font-semibold">Category</label>
            <select name="categoryId" class="w-full border p-2 rounded" required>

                <option value="">-- Pilih Category --</option>

                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}">
                </option>

            </select>
        </div>

        <!-- HARGA -->
        <div>
            <label class="block font-semibold">Harga</label>
            <input type="number" th:field="*{price}"
                   placeholder="Masukkan harga"
                   class="w-full border p-2 rounded" required />
        </div>

        <!-- STOCK -->
        <div>
            <label class="block font-semibold">Stock</label>
            <input type="number" th:field="*{stock}"
                   placeholder="Masukkan jumlah stok"
                   class="w-full border p-2 rounded" required />
        </div>

        <!-- DESKRIPSI -->
        <div>
            <label class="block font-semibold">Deskripsi</label>
            <textarea th:field="*{description}"
                      placeholder="Deskripsi produk"
                      class="w-full border p-2 rounded"></textarea>
        </div>

        <!-- STATUS -->
        <label class="flex items-center gap-2">
            <input type="checkbox" th:field="*{active}" />
            Aktif
        </label>

        <!-- BUTTON -->
        <button type="submit"
                class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Save
        </button>

    </form>

</div>

</body>
</html>
