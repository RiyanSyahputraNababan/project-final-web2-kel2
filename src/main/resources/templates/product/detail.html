<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detail Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">

    <h2 class="text-xl font-bold mb-4">Detail Produk</h2>

    <p><b>Nama:</b> <span th:text="${product.name}"></span></p>

    <p><b>Category:</b>
        <span th:text="${product.category != null ? product.category.name : '-'}"></span>
    </p>

    <p><b>Harga:</b>
        <span th:text="'Rp ' + ${#numbers.formatInteger(product.price, 0, 'POINT')}"></span>
    </p>

    <p><b>Stock:</b> <span th:text="${product.stock}"></span></p>

    <p><b>Status:</b>
        <span th:text="${product.active ? 'Aktif' : 'Tidak Aktif'}"></span>
    </p>

    <p><b>Deskripsi:</b></p>
    <p class="text-gray-600" th:text="${product.description}"></p>

    <a href="/products"
       class="inline-block mt-4 text-blue-500 underline">
        ← Kembali
    </a>

</div>

</body>
</html>
