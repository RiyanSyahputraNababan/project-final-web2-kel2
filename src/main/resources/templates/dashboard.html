<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout (~{::body})">

<body>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- TOTAL PRODUK -->
    <div class="bg-white p-5 rounded shadow">
        <h3 class="text-lg font-bold">Total Produk</h3>
        <p class="text-2xl text-blue-600" th:text="${totalProducts}"></p>
    </div>

    <!-- TOTAL INVENTORY -->
    <div class="bg-white p-5 rounded shadow">
        <h3 class="text-lg font-bold">Total Inventory</h3>
        <p class="text-2xl text-green-600"
           th:text="'Rp ' + ${#numbers.formatInteger(totalValue, 0, 'POINT')}"></p>
    </div>

    <!-- STATUS -->
    <div class="bg-white p-5 rounded shadow">
        <h3 class="font-bold">Status Produk</h3>
        <p>Aktif: <span th:text="${activeCount}"></span></p>
        <p>Tidak Aktif: <span th:text="${inactiveCount}"></span></p>
    </div>

</div>

<!-- CATEGORY -->
<div class="mt-6 bg-white p-5 rounded shadow">
    <h3 class="font-bold mb-3">Produk per Category</h3>

    <div th:if="${#maps.isEmpty(categoryStats)}" class="text-gray-500">
        Belum ada kategori
    </div>

    <ul th:if="${!#maps.isEmpty(categoryStats)}">
        <li th:each="entry : ${categoryStats}">
            <span th:text="${entry.key}"></span> :
            <span th:text="${entry.value}"></span>
        </li>
    </ul>
</div>

<!-- LOW STOCK -->
<div class="mt-6 bg-white p-5 rounded shadow">
    <h3 class="font-bold mb-3">Low Stock (&lt; 5)</h3>

    <div th:if="${#lists.isEmpty(lowStock)}">
        <p>Semua stok aman 👍</p>
    </div>

    <ul th:if="${!#lists.isEmpty(lowStock)}">
        <li th:each="p : ${lowStock}">
            <span th:text="${p.name}"></span> -
            <span th:text="${p.stock}"></span>
        </li>
    </ul>
</div>

</body>
</html>
