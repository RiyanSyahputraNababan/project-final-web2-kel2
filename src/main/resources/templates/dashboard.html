<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/layout :: layout(~{::body})">

<body>

<!-- ===== STATS CARDS ===== -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- TOTAL PRODUK -->
    <div class="bg-white/80 backdrop-blur-lg p-6 rounded-2xl shadow hover:shadow-xl transition">
        <h3 class="text-gray-500">Total Produk</h3>
        <p class="text-3xl font-bold text-blue-500 mt-2"
           th:text="${totalProducts}">0</p>
    </div>

    <!-- TOTAL INVENTORY -->
    <div class="bg-white/80 backdrop-blur-lg p-6 rounded-2xl shadow hover:shadow-xl transition">
        <h3 class="text-gray-500">Total Inventory</h3>
        <p class="text-3xl font-bold text-green-500 mt-2"
           th:text="'Rp ' + ${#numbers.formatInteger(totalValue, 0, 'POINT')}">
            Rp 0
        </p>
    </div>

    <!-- STATUS -->
    <div class="bg-white/80 backdrop-blur-lg p-6 rounded-2xl shadow hover:shadow-xl transition">
        <h3 class="text-gray-500 mb-2">Status Produk</h3>
        <p class="text-sm">Aktif:
            <span class="font-bold text-blue-500"
                  th:text="${activeCount}">0</span>
        </p>
        <p class="text-sm">Tidak Aktif:
            <span class="font-bold text-gray-600"
                  th:text="${inactiveCount}">0</span>
        </p>
    </div>

</div>

<!-- ===== CATEGORY STATS ===== -->
<div class="mt-8 bg-white/80 backdrop-blur-lg p-6 rounded-2xl shadow">

    <h3 class="font-bold text-lg text-gray-700 mb-4">
        Produk per Category
    </h3>

    <div th:if="${#maps.isEmpty(categoryStats)}"
         class="text-gray-400 text-sm">
        Belum ada kategori
    </div>

    <ul th:if="${!#maps.isEmpty(categoryStats)}"
        class="space-y-2">

        <li th:each="entry : ${categoryStats}"
            class="flex justify-between bg-gray-50 px-4 py-2 rounded-lg">

            <span class="text-gray-600"
                  th:text="${entry.key}">Kategori</span>

            <span class="font-bold text-blue-500"
                  th:text="${entry.value}">0</span>

        </li>

    </ul>

</div>

<!-- ===== LOW STOCK ===== -->
<div class="mt-8 bg-white/80 backdrop-blur-lg p-6 rounded-2xl shadow">

    <h3 class="font-bold text-lg text-gray-700 mb-4">
        Low Stock (&lt; 5)
    </h3>

    <div th:if="${#lists.isEmpty(lowStock)}"
         class="text-gray-400 text-sm">
        Semua stok aman 👍
    </div>

    <ul th:if="${!#lists.isEmpty(lowStock)}"
        class="space-y-2">

        <li th:each="p : ${lowStock}"
            class="flex justify-between bg-red-50 px-4 py-2 rounded-lg">

            <span class="text-gray-700"
                  th:text="${p.name}">Nama</span>

            <span class="font-bold text-red-500"
                  th:text="${p.stock}">0</span>

        </li>

    </ul>

</div>

<!-- ===== EMPTY STATE ===== -->
<div class="mt-10 text-center"
     th:if="${totalProducts == 0}">

    <p class="text-gray-400 text-sm mb-2">
        Belum ada produk
    </p>

    <a href="/products/new"
       class="inline-block bg-blue-500 text-white px-5 py-2 rounded-lg shadow hover:bg-blue-600 transition">
        + Tambah Produk
    </a>

</div>

</body>
</html>
