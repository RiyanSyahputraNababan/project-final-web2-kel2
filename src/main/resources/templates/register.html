<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-100 via-white to-blue-100 flex items-center justify-center min-h-screen">

<div class="bg-white/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-96">

    <!-- LOGO -->
    <div class="text-center mb-6">
        <div class="bg-green-500 text-white px-4 py-2 rounded-lg inline-block font-bold shadow">
            K.2
        </div>
    </div>

    <!-- TITLE -->
    <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-6">
        Create Account 🚀
    </h2>

    <!-- ERROR -->
    <div th:if="${error}"
         class="bg-red-100 border border-red-300 text-red-700 p-2 rounded mb-3 text-sm text-center">
        <span th:text="${error}"></span>
    </div>

    <!-- SUCCESS -->
    <div th:if="${success}"
         class="bg-green-100 border border-green-300 text-green-700 p-2 rounded mb-3 text-sm text-center">
        <span th:text="${success}"></span>
    </div>

    <form method="post" action="/register" class="space-y-4">

        <!-- USERNAME -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Username</label>
            <input name="username"
                   placeholder="Masukkan username"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-green-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- FULL NAME -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Nama Lengkap</label>
            <input name="fullName"
                   placeholder="Masukkan nama lengkap"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-green-400 p-2 rounded-lg mt-1" />
        </div>

        <!-- EMAIL -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Email</label>
            <input type="email" name="email"
                   placeholder="Masukkan email"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-green-400 p-2 rounded-lg mt-1" />
        </div>

        <!-- PASSWORD -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Password</label>
            <input type="password" name="password"
                   placeholder="Masukkan password"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-green-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- CONFIRM PASSWORD -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Konfirmasi Password</label>
            <input type="password" name="confirmPassword"
                   placeholder="Ulangi password"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-green-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <!-- BUTTON -->
        <button
                class="w-full bg-green-500 text-white py-2 rounded-lg shadow hover:bg-green-600 hover:scale-[1.02] transition duration-200">
            Register
        </button>

    </form>

    <!-- LINK -->
    <p class="mt-6 text-center text-sm text-gray-600">
        Sudah punya akun?
        <a href="/login" class="text-blue-500 font-semibold hover:underline">
            Login
        </a>
    </p>

</div>

</body>
</html>
