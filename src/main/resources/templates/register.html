<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded shadow w-96">

    <h2 class="text-xl font-bold mb-4 text-center">Register</h2>

    <!-- ERROR MESSAGE -->
    <div th:if="${error}"
         class="bg-red-100 text-red-700 p-2 rounded mb-3 text-sm">
        <span th:text="${error}"></span>
    </div>

    <!-- SUCCESS -->
    <div th:if="${success}"
         class="bg-green-100 text-green-700 p-2 rounded mb-3 text-sm">
        <span th:text="${success}"></span>
    </div>

    <form method="post" action="/register" class="space-y-3">

        <input name="username" placeholder="Username"
               class="w-full border p-2 rounded" required />

        <input name="fullName" placeholder="Nama Lengkap"
               class="w-full border p-2 rounded" />

        <input type="email" name="email" placeholder="Email"
               class="w-full border p-2 rounded" />

        <input type="password" name="password" placeholder="Password"
               class="w-full border p-2 rounded" required />

        <input type="password" name="confirmPassword" placeholder="Konfirmasi Password"
               class="w-full border p-2 rounded" required />

        <!-- 🔥 WAJIB -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <button class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600">
            Register
        </button>

    </form>

    <p class="mt-4 text-center text-sm">
        Sudah punya akun?
        <a href="/login" class="text-blue-500 underline">Login</a>
    </p>

</div>

</body>
</html>
