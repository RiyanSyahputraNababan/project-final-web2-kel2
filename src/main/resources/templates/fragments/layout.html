<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <title th:text="${title}">App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-blue-600 text-white p-4 flex justify-between items-center">

    <div class="font-bold text-lg">
        <a href="/dashboard">Product App</a>
    </div>

    <div class="flex items-center gap-6">

        <a href="/dashboard" class="hover:underline">Dashboard</a>
        <a href="/products" class="hover:underline">Produk</a>

        <!-- DROPDOWN -->
        <div class="relative group">

            <button class="font-semibold">
                👤 Account
            </button>

            <div class="absolute right-0 mt-2 w-40 bg-white text-black rounded shadow hidden group-hover:block">

                <a href="/profile" class="block px-4 py-2 hover:bg-gray-100">
                    Profile
                </a>

                <a href="/profile/change-password" class="block px-4 py-2 hover:bg-gray-100">
                    Change Password
                </a>

                <a href="/logout" class="block px-4 py-2 hover:bg-gray-100 text-red-500">
                    Logout
                </a>

            </div>
        </div>

    </div>
</nav>

<div class="max-w-6xl mx-auto mt-4">

    <!-- SUCCESS -->
    <div th:if="${success}"
         class="bg-green-100 text-green-700 p-3 rounded mb-4">
        <span th:text="${success}"></span>
    </div>

    <!-- ERROR -->
    <div th:if="${error}"
         class="bg-red-100 text-red-700 p-3 rounded mb-4">
        <span th:text="${error}"></span>
    </div>

</div>

<!-- CONTENT -->
<div class="p-6">
    <div th:replace="${content}"></div>
</div>

</body>
</html>
