<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <title th:text="${title}">App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 via-white to-blue-100 min-h-screen">

<!-- ===== NAVBAR ===== -->
<nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">

    <!-- LOGO -->
    <div class="flex items-center gap-3">
        <div class="bg-gradient-to-r from-blue-500 to-indigo-500 text-white px-3 py-1 rounded-lg font-bold shadow">
            K.2
        </div>
        <span class="font-bold text-gray-700 text-lg">
            Product App
        </span>
    </div>

    <!-- MENU -->
    <div class="flex items-center gap-6 text-sm">

        <a href="/dashboard"
           class="text-gray-600 hover:text-blue-500 transition">
            Dashboard
        </a>

        <a href="/products"
           class="text-gray-600 hover:text-blue-500 transition">
            Produk
        </a>

        <!-- ===== DROPDOWN (FIXED) ===== -->
        <div class="relative">

            <button onclick="toggleDropdown()"
                    class="font-semibold text-gray-700 hover:text-blue-500 transition">
                👤 Account
            </button>

            <div id="dropdownMenu"
                 class="absolute right-0 mt-2 w-44 bg-white rounded-xl shadow-lg hidden overflow-hidden z-50">

                <a href="/profile"
                   class="block px-4 py-2 hover:bg-gray-100">
                    Profile
                </a>

                <a href="/profile/change-password"
                   class="block px-4 py-2 hover:bg-gray-100">
                    Change Password
                </a>

                <form action="/logout" method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <button
                            class="w-full text-left px-4 py-2 hover:bg-red-100 text-red-500">
                        Logout
                    </button>
                </form>

            </div>
        </div>

    </div>
</nav>

<!-- ===== ALERT ===== -->
<div class="max-w-6xl mx-auto mt-6 px-4">

    <div th:if="${success}"
         class="bg-green-100 border border-green-300 text-green-700 p-3 rounded-lg mb-4 shadow-sm">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}"
         class="bg-red-100 border border-red-300 text-red-700 p-3 rounded-lg mb-4 shadow-sm">
        <span th:text="${error}"></span>
    </div>

</div>

<!-- ===== CONTENT ===== -->
<div class="max-w-6xl mx-auto px-4 pb-10">
    <div th:replace="${content}"></div>
</div>

<!-- ===== SCRIPT DROPDOWN ===== -->
<script>
    function toggleDropdown() {
        const menu = document.getElementById("dropdownMenu");
        menu.classList.toggle("hidden");
    }

    // klik di luar → close dropdown
    document.addEventListener("click", function (event) {
        const dropdown = document.getElementById("dropdownMenu");
        const button = event.target.closest("button");

        if (!event.target.closest(".relative")) {
            dropdown.classList.add("hidden");
        }
    });
</script>

</body>
</html>
