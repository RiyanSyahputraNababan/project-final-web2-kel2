<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">

    <h2 class="text-xl font-bold mb-4">Ganti Password</h2>

    <!-- SUCCESS -->
    <div th:if="${success}"
         class="bg-green-100 text-green-700 p-2 rounded mb-3 text-sm">
        <span th:text="${success}"></span>
    </div>

    <!-- ERROR -->
    <div th:if="${error}"
         class="bg-red-100 text-red-700 p-2 rounded mb-3 text-sm">
        <span th:text="${error}"></span>
    </div>

    <form method="post" action="/profile/change-password" class="space-y-3">

        <input type="password" name="oldPassword"
               placeholder="Password Lama"
               class="w-full border p-2 rounded" required />

        <input type="password" name="newPassword"
               placeholder="Password Baru"
               class="w-full border p-2 rounded" required />

        <input type="password" name="confirmPassword"
               placeholder="Konfirmasi Password"
               class="w-full border p-2 rounded" required />

        <!-- 🔥 WAJIB: CSRF TOKEN -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
            Update Password
        </button>

    </form>

    <!-- BACK -->
    <div class="mt-4 text-center">
        <a href="/profile" class="text-gray-600 hover:underline">
            ← Kembali ke Profile
        </a>
    </div>

</div>

</body>
</html>
