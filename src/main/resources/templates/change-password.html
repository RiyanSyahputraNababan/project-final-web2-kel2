<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 via-white to-blue-100 min-h-screen flex items-center justify-center p-6">

<div class="max-w-md w-full bg-white/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl">

    <!-- TITLE -->
    <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-6">
        Ganti Password 🔒
    </h2>

    <!-- SUCCESS -->
    <div th:if="${success}"
         class="bg-green-100 border border-green-300 text-green-700 p-3 rounded-lg mb-4 text-sm text-center">
        <span th:text="${success}"></span>
    </div>

    <!-- ERROR -->
    <div th:if="${error}"
         class="bg-red-100 border border-red-300 text-red-700 p-3 rounded-lg mb-4 text-sm text-center">
        <span th:text="${error}"></span>
    </div>

    <form method="post" action="/profile/change-password" class="space-y-4">

        <!-- PASSWORD LAMA -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Password Lama</label>
            <input type="password" name="oldPassword"
                   placeholder="Masukkan password lama"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- PASSWORD BARU -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Password Baru</label>
            <input type="password" name="newPassword"
                   placeholder="Masukkan password baru"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- KONFIRMASI -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Konfirmasi Password</label>
            <input type="password" name="confirmPassword"
                   placeholder="Ulangi password"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <!-- BUTTON -->
        <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded-lg shadow hover:bg-blue-600 hover:scale-[1.02] transition duration-200">
            Update Password
        </button>

    </form>

    <!-- BACK -->
    <div class="mt-6 text-center">
        <a href="/profile"
           class="text-gray-600 hover:text-blue-500 transition">
            ← Kembali ke Profile
        </a>
    </div>

</div>

</body>
</html>
