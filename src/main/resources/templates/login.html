<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-blue-200 flex items-center justify-center h-screen">

<div class="bg-white/80 backdrop-blur-lg p-8 rounded-2xl shadow-2xl w-96">

    <!-- LOGO -->
    <div class="text-center mb-6">
        <div class="bg-blue-500 text-white px-4 py-2 rounded-lg inline-block font-bold shadow">
            K.2
        </div>
    </div>

    <!-- TITLE -->
    <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-6">
        Welcome Back 👋
    </h2>

    <!-- ERROR MESSAGE -->
    <div th:if="${param.error}"
         class="bg-red-100 border border-red-300 text-red-700 p-2 rounded mb-3 text-sm text-center">
        Username atau password salah
    </div>

    <!-- LOGOUT MESSAGE -->
    <div th:if="${param.logout}"
         class="bg-green-100 border border-green-300 text-green-700 p-2 rounded mb-3 text-sm text-center">
        Logout berhasil
    </div>

    <form method="post" action="/login" class="space-y-4">

        <!-- USERNAME -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Username</label>
            <input type="text" name="username"
                   placeholder="Masukkan username"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- PASSWORD -->
        <div>
            <label class="text-sm font-semibold text-gray-600">Password</label>
            <input type="password" name="password"
                   placeholder="Masukkan password"
                   class="w-full border border-gray-300 focus:ring-2 focus:ring-blue-400 p-2 rounded-lg mt-1"
                   required />
        </div>

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <!-- BUTTON -->
        <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded-lg shadow hover:bg-blue-600 hover:scale-[1.02] transition duration-200">
            Login
        </button>

    </form>

    <!-- LINK -->
    <p class="mt-6 text-center text-sm text-gray-600">
        Belum punya akun?
        <a href="/register" class="text-blue-500 font-semibold hover:underline">
            Register
        </a>
    </p>

</div>

</body>
</html>
