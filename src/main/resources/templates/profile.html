<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-100 via-white to-blue-100 min-h-screen">

<!-- NAVBAR -->
<nav class="bg-white shadow-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

        <div class="flex items-center gap-2">
            <div class="bg-blue-500 text-white px-3 py-1 rounded-lg font-bold shadow">
                K.2
            </div>
            <span class="font-bold text-gray-700">Product App</span>
        </div>

        <div class="flex items-center gap-6 text-sm">

            <a href="/dashboard" class="text-gray-600 hover:text-blue-500 transition">
                Dashboard
            </a>

            <a href="/products" class="text-gray-600 hover:text-blue-500 transition">
                Products
            </a>

            <a href="/profile" class="text-blue-500 font-semibold">
                Profile
            </a>

            <form action="/logout" method="post">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                <button class="text-red-500 hover:text-red-600 font-semibold">
                    Logout
                </button>
            </form>

        </div>

    </div>
</nav>

<!-- PROFILE CARD -->
<div class="max-w-3xl mx-auto mt-10 px-4">

    <div class="bg-white/80 backdrop-blur-lg rounded-2xl shadow-xl p-8">

        <!-- HEADER -->
        <div class="flex flex-col md:flex-row items-center gap-6">

            <!-- FOTO -->
            <img th:src="${user.profileImageUrl != null ? user.profileImageUrl : 'https://via.placeholder.com/150'}"
                 class="w-32 h-32 rounded-full object-cover border-4 border-blue-200 shadow" />

            <!-- INFO -->
            <div class="text-center md:text-left">
                <h2 class="text-2xl font-extrabold text-gray-800"
                    th:text="${user.fullName}"></h2>

                <p class="text-gray-500"
                   th:text="${user.username}"></p>
            </div>

        </div>

        <!-- DETAIL -->
        <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">

            <div>
                <p class="text-gray-500">Email</p>
                <p class="font-semibold text-gray-700" th:text="${user.email}"></p>
            </div>

            <div>
                <p class="text-gray-500">Phone</p>
                <p class="font-semibold text-gray-700" th:text="${user.phoneNumber}"></p>
            </div>

            <div>
                <p class="text-gray-500">Address</p>
                <p class="font-semibold text-gray-700" th:text="${user.address}"></p>
            </div>

            <div>
                <p class="text-gray-500">Bio</p>
                <p class="font-semibold text-gray-700" th:text="${user.bio}"></p>
            </div>

        </div>

        <!-- BUTTON -->
        <div class="mt-8 flex flex-col sm:flex-row gap-3">

            <a href="/profile/edit"
               class="flex-1 bg-blue-500 text-white text-center px-4 py-2 rounded-lg shadow hover:bg-blue-600 hover:scale-[1.02] transition">
                Edit Profile
            </a>

            <a href="/profile/change-password"
               class="flex-1 bg-gray-500 text-white text-center px-4 py-2 rounded-lg shadow hover:bg-gray-600 hover:scale-[1.02] transition">
                Ganti Password
            </a>

        </div>

    </div>

</div>

</body>
</html>
