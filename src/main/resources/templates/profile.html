<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<nav class="bg-white shadow mb-6">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">

        <div class="font-bold text-lg">
            Product App
        </div>

        <div class="space-x-4">

            <a href="/dashboard" class="text-gray-700 hover:text-blue-500">
                Dashboard
            </a>

            <a href="/products" class="text-gray-700 hover:text-blue-500">
                Products
            </a>

            <a href="/profile" class="text-blue-500 font-semibold">
                Profile
            </a>

            <form action="/logout" method="post" class="inline">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                <button class="text-red-500 hover:underline">
                    Logout
                </button>
            </form>

        </div>

    </div>
</nav>

<div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">

    <div class="flex items-center gap-6">
        <img th:src="${user.profileImageUrl != null ? user.profileImageUrl : 'https://via.placeholder.com/150'}"
             class="w-32 h-32 rounded-full object-cover border" />

        <div>
            <h2 class="text-2xl font-bold" th:text="${user.fullName}"></h2>
            <p class="text-gray-600" th:text="${user.username}"></p>
        </div>
    </div>

    <div class="mt-6 space-y-2">
        <p><b>Email:</b> <span th:text="${user.email}"></span></p>
        <p><b>Phone:</b> <span th:text="${user.phoneNumber}"></span></p>
        <p><b>Address:</b> <span th:text="${user.address}"></span></p>
        <p><b>Bio:</b> <span th:text="${user.bio}"></span></p>
    </div>

    <div class="mt-6 flex gap-3">
        <a href="/profile/edit"
           class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Edit Profile
        </a>

        <a href="/profile/change-password"
           class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
            Ganti Password
        </a>
    </div>

</div>

</body>
</html>
