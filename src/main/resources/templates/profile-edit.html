<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">

  <h2 class="text-xl font-bold mb-4">Edit Profile</h2>

  <form method="post" action="/profile/update" class="space-y-3">

    <input name="fullName" th:value="${user.fullName}"
           placeholder="Nama"
           class="w-full border p-2 rounded" />

    <input name="email" th:value="${user.email}"
           placeholder="Email"
           class="w-full border p-2 rounded" />

    <input name="phoneNumber" th:value="${user.phoneNumber}"
           placeholder="Phone"
           class="w-full border p-2 rounded" />

    <input name="address" th:value="${user.address}"
           placeholder="Address"
           class="w-full border p-2 rounded" />

    <textarea name="bio" th:text="${user.bio}"
              placeholder="Bio"
              class="w-full border p-2 rounded"></textarea>

    <input name="profileImageUrl" th:value="${user.profileImageUrl}"
           placeholder="Image URL"
           class="w-full border p-2 rounded" />

    <button type="submit"
            class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
      Save
    </button>

  </form>

</div>

</body>
</html>
