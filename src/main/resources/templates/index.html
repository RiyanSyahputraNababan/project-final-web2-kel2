<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-white to-blue-200 flex items-center justify-center h-screen">

<div class="bg-white/80 backdrop-blur-lg shadow-2xl rounded-2xl p-10 text-center max-w-md w-full">

    <!-- LOGO / TITLE -->
    <div class="mb-6">
        <div class="bg-blue-500 text-white font-bold text-xl px-4 py-2 rounded-lg inline-block shadow">

        </div>
    </div>

    <!-- TITLE -->

    <div class="flex gap-4 justify-center">

        <a href="/register"
